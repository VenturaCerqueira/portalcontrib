services:
  # MySQL Database
  - type: pgsql  # Render MySQL via PostgreSQL service (MySQL compatible)
    name: portal-mysql
    env: mysql

  # Backend - Node Web Service
  - type: web
    name: portal-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_HOST
        fromDatabase:
          name: portal-mysql
          property: host
      - key: DB_PORT
        fromDatabase:
          name: portal-mysql
          property: port
      - key: DB_NAME
        fromDatabase:
          name: portal-mysql
          property: databaseName
      - key: DB_USER
        fromDatabase:
          name: portal-mysql
          property: user
      - key: DB_PASS
        fromDatabase:
          name: portal-mysql
          property: password
      - key: FRONTEND_URL
        value: https://portal-frontend.onrender.com  # Update after deploy

  # Frontend - Static Site  
  - type: web
    name: portal-frontend
    env: static
    buildCommand: npm ci && npm run build
    staticPublishDir: dist/
    envVars:
      - key: VITE_API_URL
        fromService:
          name: portal-backend
          type: web
          property: url

