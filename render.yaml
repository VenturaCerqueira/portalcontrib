services:
  # Backend - Node Web Service
  - type: web
    name: portal-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20

  # Frontend - Static Site  
  - type: web
    name: portal-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishDir: dist/
