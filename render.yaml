services:
  # Fullstack Backend + Frontend (monorepo)
  - type: web
    name: portalcontrib-fullstack
    env: node
    buildCommand: |
      cd backend && npm ci &&
      cd .. && npm ci && npm run build &&
      cp -r dist/* backend/public/
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_HOST
        value: db-keepsistemas-sql8.c3emmyqhonte.sa-east-1.rds.amazonaws.com
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: db_gestaotributaria_riachaodojacuipe
      - key: DB_USER
        value: anderson
      - key: DB_PASS
        value: 126303@acv

