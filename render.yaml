services:
  - type: web
    name: portalcontrib
    runtime: node
    rootDir: backend
    buildCommand: |
      npm ci &&
      cd .. && npm ci && npm run build &&
      cd backend &&
      rm -rf public && mkdir -p public &&
      cp -r ../dist/* public/ &&
      echo "✅ Frontend copied to backend/public/"
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_HOST
        value: db-keepsistemas-sql8.c3emmyqhonte.sa-east-1.rds.amazonaws.com
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        value: db_gestaotributaria_riachaodojacuipe
      - key: DB_USER
        value: anderson
      - key: DB_PASS
        value: 126303@acv

