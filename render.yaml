services:
  - type: web
    name: portalcontrib
    runtime: node
    rootDir: backend
    buildCommand: |
      npm install &&
      cd .. && npm install && npm run build &&
      mkdir -p public && cp -r ../dist/* public/
    startCommand: node server.js
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_HOST
